# .github/workflows/ci.yml
name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ---- Job 1: Lint -------------------------------------------------------
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linters
        run: pip install ruff black

      - name: Run ruff (fast linter)
        run: ruff check src/ tests/

      - name: Run black (format check)
        run: black --check src/ tests/

  # ---- Job 2: Test -------------------------------------------------------
  test:
    name: Test Suite + Coverage
    runs-on: ubuntu-latest
    needs: lint   # only run if lint passes
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 3
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full test suite
        env:
          DB_PATH: ./db/nifty100.db
          JWT_SECRET_KEY: ci_test_secret_not_for_production
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest tests/ -v --asyncio-mode=auto --cov=src --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ---- Job 3: Docker Build -------------------------------------------------------
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: test   # only run if tests pass
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: api
          push: false   # don't push to registry (no credentials needed)
          tags: nifty100-api:ci

      - name: Build Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: dashboard
          push: false
          tags: nifty100-dashboard:ci
